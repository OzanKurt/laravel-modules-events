name: tests

on:
    push:
        branches: [master, v1.0]
    pull_request:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: ['8.4']
                laravel: ['12.*']
                include:
                    - laravel: 12.*
                      testbench: 10.*
                # Laravel 13 will be added once pestphp/pest-plugin-laravel
                # publishes a release supporting laravel/framework ^13.0.
                # Filament axis is pending v1.1 — admin resources are not
                # shipped in v1.0 (module is headless).

        name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: pcov
                  tools: composer:v2

            - name: Cache composer
              uses: actions/cache@v4
              with:
                  path: ~/.composer/cache
                  key: composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}

            - name: Require Laravel ${{ matrix.laravel }}
              run: |
                  composer require --no-update --no-interaction \
                      "illuminate/contracts:${{ matrix.laravel }}" \
                      "illuminate/database:${{ matrix.laravel }}" \
                      "illuminate/support:${{ matrix.laravel }}" \
                      "orchestra/testbench:${{ matrix.testbench }}"

            - name: Install
              run: composer update --prefer-stable --prefer-dist --no-interaction

            - name: Pint
              run: vendor/bin/pint --test

            - name: PHPStan
              run: vendor/bin/phpstan analyse --memory-limit=2G

            - name: Pest
              run: vendor/bin/pest
